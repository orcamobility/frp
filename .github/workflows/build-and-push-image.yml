name: Build and Push frpc/frps base images to ECR

on:
  push:
    branches:
      - main
  # release:
  #   types: [ published ]
  # workflow_dispatch:
  #   inputs:
  #     tag:
  #       description: 'Image tag'
  #       required: true
  #       default: 'test'
permissions:
  contents: read
  id-token: write

concurrency:
  group: build-base-image
  cancel-in-progress: true

env:
  TAG_NAME: ${{ github.sha }}
  REPOSITORY_BASE: 037465309653.dkr.ecr.us-west-2.amazonaws.com

jobs:
  image:
    name: Build Image from Dockerfile and binaries
    runs-on: ubuntu-latest
    steps:
      # environment
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::037465309653:role/frp-ci
          aws-region: us-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # prepare image tags
      - name: Prepare Image Tags
        run: |
          echo "TAG_FRPC=${{ env.REPOSITORY_BASE }}/frpc:${{ env.TAG_NAME }}" >> $GITHUB_ENV
          echo "TAG_FRPS=${{ env.REPOSITORY_BASE }}/frps:${{ env.TAG_NAME }}" >> $GITHUB_ENV

      - name: Log tags
        run: |
          echo $TAG_FRPC
          echo $TAG_FRPS

      - name: Build and push frps
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfiles/Dockerfile-for-frps
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x
          push: true
          tags: |
            ${{ env.TAG_FRPS }}

      - name: Build and push frpc
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfiles/Dockerfile-for-frpc
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x
          push: true
          tags: |
            ${{ env.TAG_FRPC }}
